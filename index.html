<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Live2D WebAR</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      background: #000;
    }

    #startButton {
      position: fixed;
      z-index: 9999;
      left: 50%;
      bottom: 40px;
      transform: translateX(-50%);
      padding: 14px 24px;
      border: none;
      border-radius: 999px;
      background: #fff;
      color: #000;
      font-size: 16px;
      font-weight: bold;
    }

    #status {
      position: fixed;
      z-index: 9999;
      left: 12px;
      top: 12px;
      padding: 8px 10px;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.65);
      color: #fff;
      font-size: 13px;
    }

    a-scene {
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>

<body>
  <div id="status">待機中</div>
  <button id="startButton">ARを開始</button>

  <a-scene
    mindar-image="imageTargetSrc: ./assets/target.mind; autoStart: false;"
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    embedded
  >
    <a-assets>
      <video
        id="characterVideo"
        src="./assets/character.webm"
        loop
        muted
        playsinline
        webkit-playsinline
        preload="auto"
      ></video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity id="target" mindar-image-target="targetIndex: 0">
      <a-video
        src="#characterVideo"
        position="0 0 0.01"
        rotation="0 0 0"
        width="1"
        height="1.777"
      ></a-video>
    </a-entity>
  </a-scene>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const sceneEl = document.querySelector("a-scene");
      const startButton = document.querySelector("#startButton");
      const status = document.querySelector("#status");
      const video = document.querySelector("#characterVideo");
      const target = document.querySelector("#target");

      let arSystem = null;

      sceneEl.addEventListener("loaded", () => {
        arSystem = sceneEl.systems["mindar-image-system"];
        status.textContent = "準備OK：ARを開始を押してね";
      });

      sceneEl.addEventListener("arReady", () => {
        status.textContent = "カメラ起動OK：マーカーを映してね";
      });

      sceneEl.addEventListener("arError", () => {
        status.textContent = "カメラ起動エラー：Safari/権限/httpsを確認";
        startButton.style.display = "block";
      });

      target.addEventListener("targetFound", () => {
        status.textContent = "認識OK";
        video.play();
      });

      target.addEventListener("targetLost", () => {
        status.textContent = "マーカーを探しています";
        video.pause();
        video.currentTime = 0;
      });

      startButton.addEventListener("click", async () => {
        startButton.style.display = "none";
        status.textContent = "起動中...";

        try {
          await video.play();
          video.pause();
          video.currentTime = 0;

          if (arSystem) {
            await arSystem.start();
          } else {
            status.textContent = "まだ読み込み中。少し待ってもう一度押してね";
            startButton.style.display = "block";
          }
        } catch (error) {
          console.error(error);
          status.textContent = "起動失敗：カメラ許可/https/動画形式を確認";
          startButton.style.display = "block";
        }
      });
    });
  </script>
</body>
</html>
