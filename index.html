<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>MindAR MOV Test</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      background: black;
    }

    video {
      object-fit: cover;
    }

    #msg {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 9999;
      color: white;
      background: rgba(0,0,0,0.5);
      padding: 8px 12px;
      border-radius: 10px;
      font-family: sans-serif;
    }
  </style>
</head>

<body>

<div id="msg">マーカーを映してください</div>

<a-scene
  mindar-image="imageTargetSrc: ./target2.mind; autoStart: true;"
  color-space="sRGB"
  renderer="colorManagement: true, physicallyCorrectLights; alpha: true"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
  embedded
>

  <a-assets>
    <video
      id="characterVideo"
      src="./assets/character.mov"
      autoplay
      loop
      muted
      playsinline
      webkit-playsinline
      crossorigin="anonymous"
    ></video>
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity mindar-image-target="targetIndex: 0">

    <!--
      立体っぽく見えるように、動画面をマーカー面から90度起こしています。

      重要：
      MindARのマーカー面はだいたい X/Y 平面です。
      キャラを「上に立てる」には、position の3つ目(Z)を上げます。
      前の position="0 0.8 0" だと、マーカー面の中で上にズレるだけになりやすいです。
    -->
    <a-video
      src="#characterVideo"
      width="1"
      height="1.7"
      position="0 0 0.85"
      rotation="90 0 0"
      material="transparent: true; side: double;"
    ></a-video>

  </a-entity>

</a-scene>

<script>
const msg = document.querySelector("#msg");
const target = document.querySelector("[mindar-image-target]");
const vid = document.querySelector("#characterVideo");

async function playVideo() {
  try {
    await vid.play();
  } catch(e) {
    console.log(e);
  }
}

document.body.addEventListener("click", playVideo);
document.body.addEventListener("touchstart", playVideo);

target.addEventListener("targetFound", () => {
  msg.textContent = "読み込み成功";
  playVideo();
});

target.addEventListener("targetLost", () => {
  msg.textContent = "マーカーを映してください";
});
</script>

</body>
</html>
