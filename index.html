<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>AR Character Test</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent !important;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    /* iPhone Safari / GitHub Pages / MindAR のカメラ表示崩れ対策 */
    .mindar-container,
    .mindar-container video,
    video[data-mindar-video],
    body > video,
    video {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 100vw !important;
      height: 100dvh !important;
      min-width: 100vw !important;
      min-height: 100dvh !important;
      max-width: none !important;
      max-height: none !important;
      object-fit: cover !important;
      transform: none !important;
      background: transparent !important;
    }

    .mindar-container,
    .mindar-container video,
    video[data-mindar-video],
    body > video {
      z-index: 0 !important;
    }

    a-scene,
    .a-canvas,
    canvas {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 100vw !important;
      height: 100dvh !important;
      max-width: none !important;
      max-height: none !important;
      background: transparent !important;
    }

    a-scene,
    .a-canvas {
      z-index: 2 !important;
    }

    .mindar-ui-overlay,
    .mindar-ui-scanning,
    .mindar-ui-loading,
    .mindar-ui-compatibility {
      z-index: 20 !important;
      background: transparent !important;
    }

    #startScreen {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, rgba(255,255,255,.96), rgba(235,245,255,.96));
      color: #333;
      padding: 24px;
      box-sizing: border-box;
      text-align: center;
    }

    .panel {
      width: min(92vw, 460px);
      padding: 22px 18px;
      border-radius: 20px;
      background: rgba(255,255,255,.9);
      box-shadow: 0 12px 35px rgba(0,0,0,.16);
    }

    h1 { margin: 0 0 10px; font-size: 22px; }
    p { margin: 8px 0; line-height: 1.65; font-size: 14px; }

    button {
      margin-top: 16px;
      border: 0;
      border-radius: 999px;
      padding: 14px 22px;
      font-size: 16px;
      font-weight: 700;
      background: #ff6fae;
      color: #fff;
      box-shadow: 0 8px 18px rgba(255,111,174,.35);
    }

    #status {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: calc(12px + env(safe-area-inset-bottom));
      z-index: 100;
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(255,255,255,.82);
      color: #222;
      font-size: 13px;
      text-align: center;
      pointer-events: none;
    }

    #debug {
      position: fixed;
      left: 8px;
      top: calc(8px + env(safe-area-inset-top));
      z-index: 101;
      padding: 6px 8px;
      border-radius: 8px;
      background: rgba(0,0,0,.45);
      color: #fff;
      font-size: 11px;
      line-height: 1.4;
      pointer-events: none;
      display: none;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div id="startScreen">
    <div class="panel">
      <h1>ARテスト</h1>
      <p>スマホで開いて「ARを開始」を押してください。</p>
      <p>カメラ許可後、登録したマーカーを映すとキャラクターが表示されます。</p>
      <button id="startButton" type="button">ARを開始</button>
      <p id="errorText"></p>
    </div>
  </div>

  <div id="debug"></div>
  <div id="status">待機中</div>

  <a-scene
    id="scene"
    mindar-image="imageTargetSrc: ./assets/target.mind; autoStart: false; uiScanning: yes; uiLoading: yes; filterMinCF: 0.0001; filterBeta: 0.001;"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: false; alpha: true; antialias: true; logarithmicDepthBuffer: true;"
    background="transparent: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    embedded>

    <a-assets timeout="30000">
      <video
        id="characterVideo"
        src="./assets/character.webm"
        preload="auto"
        autoplay
        muted
        loop
        playsinline
        webkit-playsinline
        crossorigin="anonymous"></video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity id="target" mindar-image-target="targetIndex: 0">
      <a-video
        id="characterPlane"
        src="#characterVideo"
        position="0 0 0"
        rotation="0 0 0"
        width="1"
        height="1"
        material="transparent: true; alphaTest: 0.01; side: double; shader: flat; depthTest: false; depthWrite: false;">
      </a-video>
    </a-entity>
  </a-scene>

  <script>
    const startScreen = document.getElementById("startScreen");
    const startButton = document.getElementById("startButton");
    const errorText = document.getElementById("errorText");
    const statusText = document.getElementById("status");
    const debugText = document.getElementById("debug");
    const scene = document.getElementById("scene");
    const target = document.getElementById("target");
    const characterVideo = document.getElementById("characterVideo");

    function setStatus(text) {
      statusText.textContent = text;
    }

    function forceTransparentRenderer() {
      if (!scene.renderer || !window.THREE) return;
      scene.renderer.setClearColor(new THREE.Color(0x000000), 0);
      scene.renderer.domElement.style.background = "transparent";
    }

    function fixCameraVideoSize() {
      const allVideos = Array.from(document.querySelectorAll("video"));
      const cameraVideos = allVideos.filter((video) => video.id !== "characterVideo");

      cameraVideos.forEach((video) => {
        video.dataset.mindarVideo = "1";
        video.setAttribute("playsinline", "");
        video.setAttribute("webkit-playsinline", "");
        video.style.position = "fixed";
        video.style.top = "0";
        video.style.left = "0";
        video.style.width = "100vw";
        video.style.height = "100dvh";
        video.style.minWidth = "100vw";
        video.style.minHeight = "100dvh";
        video.style.maxWidth = "none";
        video.style.maxHeight = "none";
        video.style.objectFit = "cover";
        video.style.zIndex = "0";
        video.style.background = "transparent";
        video.style.display = "block";
        video.style.opacity = "1";
      });

      forceTransparentRenderer();

      debugText.textContent = `camera video: ${cameraVideos.length} / all video: ${allVideos.length}`;
    }

    async function prepareCharacterVideo() {
      characterVideo.muted = true;
      characterVideo.loop = true;
      characterVideo.playsInline = true;
      try {
        await characterVideo.play();
      } catch (error) {
        console.warn(error);
      }
    }

    scene.addEventListener("renderstart", () => {
      forceTransparentRenderer();
      fixCameraVideoSize();
    });

    startButton.addEventListener("click", async () => {
      errorText.textContent = "";
      setStatus("カメラ起動中…");

      try {
        await prepareCharacterVideo();

        if (!scene.hasLoaded) {
          await new Promise((resolve) => scene.addEventListener("loaded", resolve, { once: true }));
        }

        forceTransparentRenderer();
        await scene.systems["mindar-image-system"].start();
        startScreen.classList.add("hidden");
        setStatus("マーカーを映してください");

        fixCameraVideoSize();
        setTimeout(fixCameraVideoSize, 200);
        setTimeout(fixCameraVideoSize, 700);
        setTimeout(fixCameraVideoSize, 1500);
        setInterval(fixCameraVideoSize, 2000);
      } catch (error) {
        console.error(error);
        errorText.textContent = "起動できませんでした。Safari/ChromeでGitHub PagesのHTTPSを開き、カメラ許可を確認してください。";
        setStatus("起動エラー");
      }
    });

    target.addEventListener("targetFound", async () => {
      setStatus("認識中：キャラクター表示");
      try {
        characterVideo.currentTime = 0;
        await characterVideo.play();
      } catch (error) {
        console.warn(error);
      }
    });

    target.addEventListener("targetLost", () => {
      setStatus("マーカーを見失いました");
    });

    window.addEventListener("resize", fixCameraVideoSize);
    window.addEventListener("orientationchange", () => setTimeout(fixCameraVideoSize, 300));
  </script>
</body>
</html>
