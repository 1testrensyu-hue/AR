<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />

  <title>Live2D WebAR</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      touch-action: none;
    }

    #startButton {
      position: fixed;
      z-index: 9999;
      left: 50%;
      bottom: 40px;
      transform: translateX(-50%);
      padding: 14px 24px;
      border: none;
      border-radius: 999px;
      background: white;
      color: black;
      font-size: 16px;
      font-weight: bold;
    }

    #status {
      position: fixed;
      z-index: 9999;
      top: 16px;
      left: 16px;
      padding: 8px 12px;
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.7);
      color: white;
      font-size: 14px;
    }

    a-scene {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>

<body>
  <div id="status">待機中</div>
  <button id="startButton">ARを開始</button>

  <a-scene
    mindar-image="
      imageTargetSrc: ./assets/target.mind;
      autoStart: false;
    "
    color-space="sRGB"
    renderer="
      colorManagement: true;
      physicallyCorrectLights: true;
      alpha: true;
      antialias: true
    "
    background="transparent: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    embedded
  >
    <a-assets>
      <video
        id="characterVideo"
        src="./assets/character.mp4"
        preload="auto"
        loop
        muted
        playsinline
        webkit-playsinline
      ></video>
    </a-assets>

    <a-camera
      position="0 0 0"
      look-controls="enabled: false"
    ></a-camera>

    <a-entity
      id="target"
      mindar-image-target="targetIndex: 0"
    >
      <a-video
        src="#characterVideo"
        position="0 0 0.01"
        rotation="0 0 0"
        width="1"
        height="1.777"
      ></a-video>
    </a-entity>
  </a-scene>

  <script>
    const sceneEl = document.querySelector("a-scene");
    const startButton = document.querySelector("#startButton");
    const statusText = document.querySelector("#status");
    const video = document.querySelector("#characterVideo");
    const target = document.querySelector("#target");

    let arSystem = null;

    sceneEl.addEventListener("loaded", () => {
      arSystem = sceneEl.systems["mindar-image-system"];
      statusText.textContent = "AR開始ボタンを押してね";
    });

    sceneEl.addEventListener("arReady", () => {
      statusText.textContent = "カメラ起動OK：マーカーを映してね";
    });

    sceneEl.addEventListener("arError", () => {
      statusText.textContent = "カメラ起動エラー";
      startButton.style.display = "block";
    });

    target.addEventListener("targetFound", () => {
      statusText.textContent = "認識OK";
      video.play();
    });

    target.addEventListener("targetLost", () => {
      statusText.textContent = "マーカーを探しています";
      video.pause();
      video.currentTime = 0;
    });

    startButton.addEventListener("click", async () => {
      startButton.style.display = "none";
      statusText.textContent = "カメラ起動中...";

      try {
        await video.play();
        video.pause();
        video.currentTime = 0;

        if (arSystem) {
          await arSystem.start();
        } else {
          statusText.textContent = "読み込み中。少し待って再度押してね";
          startButton.style.display = "block";
        }
      } catch (e) {
        console.error(e);
        statusText.textContent = "起動失敗";
        startButton.style.display = "block";
      }
    });
  </script>
</body>
</html>
