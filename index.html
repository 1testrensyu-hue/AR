<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>AR Character Test</title>

  <!-- MindAR + A-Frame -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    /* スマホで上半分だけ映る・余白が出る対策 */
    body > video,
    .mindar-ui-overlay,
    a-scene,
    canvas {
      position: fixed !important;
      inset: 0 !important;
      width: 100vw !important;
      height: 100dvh !important;
      max-width: none !important;
      max-height: none !important;
    }

    video {
      object-fit: cover !important;
    }

    #startScreen {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, rgba(255,255,255,.96), rgba(235,245,255,.96));
      color: #333;
      padding: 24px;
      box-sizing: border-box;
      text-align: center;
    }

    .panel {
      width: min(92vw, 460px);
      padding: 22px 18px;
      border-radius: 20px;
      background: rgba(255,255,255,.9);
      box-shadow: 0 12px 35px rgba(0,0,0,.16);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 22px;
    }

    p {
      margin: 8px 0;
      line-height: 1.65;
      font-size: 14px;
    }

    button {
      margin-top: 16px;
      border: 0;
      border-radius: 999px;
      padding: 14px 22px;
      font-size: 16px;
      font-weight: 700;
      background: #ff6fae;
      color: #fff;
      box-shadow: 0 8px 18px rgba(255,111,174,.35);
    }

    #status {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: calc(12px + env(safe-area-inset-bottom));
      z-index: 30;
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(255,255,255,.82);
      color: #222;
      font-size: 13px;
      text-align: center;
      pointer-events: none;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div id="startScreen">
    <div class="panel">
      <h1>ARテスト</h1>
      <p>スマホで開いて「ARを開始」を押してください。</p>
      <p>カメラ許可後、登録したマーカーを映すとキャラクターが表示されます。</p>
      <button id="startButton" type="button">ARを開始</button>
      <p id="errorText"></p>
    </div>
  </div>

  <div id="status">待機中</div>

  <a-scene
    id="scene"
    mindar-image="imageTargetSrc: ./assets/target.mind; autoStart: false; uiScanning: yes; uiLoading: yes; filterMinCF: 0.0001; filterBeta: 0.001;"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: false; alpha: true; antialias: true;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    embedded>

    <a-assets timeout="30000">
      <video
        id="characterVideo"
        src="./assets/character.webm"
        preload="auto"
        autoplay
        muted
        loop
        playsinline
        webkit-playsinline
        crossorigin="anonymous"></video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity id="target" mindar-image-target="targetIndex: 0">
      <!-- サイズ・位置はここで調整できます -->
      <a-video
        id="characterPlane"
        src="#characterVideo"
        position="0 0 0"
        rotation="0 0 0"
        width="1"
        height="1"
        material="transparent: true; alphaTest: 0.01; side: double; shader: flat;">
      </a-video>
    </a-entity>
  </a-scene>

  <script>
    const startScreen = document.getElementById("startScreen");
    const startButton = document.getElementById("startButton");
    const errorText = document.getElementById("errorText");
    const statusText = document.getElementById("status");
    const scene = document.getElementById("scene");
    const target = document.getElementById("target");
    const characterVideo = document.getElementById("characterVideo");

    function setStatus(text) {
      statusText.textContent = text;
    }

    function fixCameraVideoSize() {
      const videos = Array.from(document.querySelectorAll("body > video, video"));
      videos.forEach((video) => {
        video.setAttribute("playsinline", "");
        video.setAttribute("webkit-playsinline", "");
        video.style.position = "fixed";
        video.style.inset = "0";
        video.style.width = "100vw";
        video.style.height = "100dvh";
        video.style.objectFit = "cover";
      });
    }

    async function prepareCharacterVideo() {
      characterVideo.muted = true;
      characterVideo.loop = true;
      characterVideo.playsInline = true;

      try {
        await characterVideo.play();
      } catch (error) {
        // iPhoneなどで初回再生が止まる場合、AR開始ボタン押下後に再試行します
        console.warn(error);
      }
    }

    startButton.addEventListener("click", async () => {
      errorText.textContent = "";
      setStatus("カメラ起動中…");

      try {
        await prepareCharacterVideo();

        if (!scene.systems || !scene.systems["mindar-image-system"]) {
          await new Promise((resolve) => scene.addEventListener("loaded", resolve, { once: true }));
        }

        await scene.systems["mindar-image-system"].start();
        startScreen.classList.add("hidden");
        setStatus("マーカーを映してください");

        setTimeout(fixCameraVideoSize, 300);
        setTimeout(fixCameraVideoSize, 1000);
      } catch (error) {
        console.error(error);
        errorText.textContent = "起動できませんでした。GitHub PagesのHTTPSで開いているか、カメラ許可を確認してください。";
        setStatus("起動エラー");
      }
    });

    target.addEventListener("targetFound", async () => {
      setStatus("認識中：キャラクター表示");
      try {
        characterVideo.currentTime = 0;
        await characterVideo.play();
      } catch (error) {
        console.warn(error);
      }
    });

    target.addEventListener("targetLost", () => {
      setStatus("マーカーを見失いました");
    });

    window.addEventListener("resize", () => {
      fixCameraVideoSize();
    });
  </script>
</body>
</html>
