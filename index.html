<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />

  <title>Live2D WebAR</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

  <!-- MindAR -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      touch-action: none;
    }

    a-scene {
      width: 100vw;
      height: 100vh;
      position: fixed;
      top: 0;
      left: 0;
    }

    #startButton {
      position: fixed;
      z-index: 9999;
      left: 50%;
      bottom: 40px;
      transform: translateX(-50%);
      padding: 14px 24px;
      border: none;
      border-radius: 999px;
      background: white;
      color: black;
      font-size: 16px;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <button id="startButton">ARを開始</button>

  <a-scene
    mindar-image="imageTargetSrc: ./assets/target.mind;"
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    embedded
  >
    <a-assets>
      <video
        id="characterVideo"
        src="./assets/character.webm"
        preload="auto"
        loop
        muted
        playsinline
        webkit-playsinline
        crossorigin="anonymous"
      ></video>
    </a-assets>

    <a-camera
      position="0 0 0"
      look-controls="enabled: false"
    ></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
      <a-video
        src="#characterVideo"
        position="0 0 0"
        rotation="0 0 0"
        width="1"
        height="1.777"
      ></a-video>
    </a-entity>
  </a-scene>

  <script>
    const startButton = document.querySelector("#startButton");
    const video = document.querySelector("#characterVideo");

    startButton.addEventListener("click", async () => {
      startButton.style.display = "none";

      try {
        await video.play();
        video.pause();
        video.currentTime = 0;
      } catch (e) {
        console.log(e);
      }
    });

    document
      .querySelector("[mindar-image-target]")
      .addEventListener("targetFound", () => {
        video.play();
      });

    document
      .querySelector("[mindar-image-target]")
      .addEventListener("targetLost", () => {
        video.pause();
        video.currentTime = 0;
      });
  </script>
</body>
</html>
