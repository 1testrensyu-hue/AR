<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Live2D WebAR Test</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
    }

    #startButton {
      position: fixed;
      z-index: 9999;
      left: 50%;
      bottom: 40px;
      transform: translateX(-50%);
      padding: 14px 24px;
      border: none;
      border-radius: 999px;
      background: white;
      font-size: 16px;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <button id="startButton">ARを開始</button>

  <a-scene
    mindar-image="imageTargetSrc: ./assets/target.mind;"
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    embedded
  >
    <a-assets>
      <video
        id="characterVideo"
        src="./assets/character.webm"
        loop
        muted
        playsinline
        webkit-playsinline
        preload="auto"
      ></video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity id="target" mindar-image-target="targetIndex: 0">
      <a-video
        src="#characterVideo"
        position="0 0 0"
        rotation="0 0 0"
        width="1"
        height="1.777"
      ></a-video>
    </a-entity>
  </a-scene>

  <script>
    const startButton = document.querySelector("#startButton");
    const video = document.querySelector("#characterVideo");
    const target = document.querySelector("#target");

    startButton.addEventListener("click", async () => {
      startButton.style.display = "none";

      try {
        await video.play();
        video.pause();
        video.currentTime = 0;
      } catch (e) {
        console.log("video prepare error", e);
      }
    });

    target.addEventListener("targetFound", () => {
      video.play();
    });

    target.addEventListener("targetLost", () => {
      video.pause();
      video.currentTime = 0;
    });
  </script>
</body>
</html>
