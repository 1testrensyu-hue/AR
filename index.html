<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>MindAR MOV Test</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      background: black;
    }

    video {
      object-fit: cover;
    }

    #msg {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 9999;
      color: white;
      background: rgba(0,0,0,0.5);
      padding: 8px 12px;
      border-radius: 10px;
      font-family: sans-serif;
    }
  </style>
</head>

<body>

<div id="msg">マーカーを映してください</div>

<a-scene
  mindar-image="imageTargetSrc: ./target2.mind; autoStart: true;"
  color-space="sRGB"
  renderer="colorManagement: true, physicallyCorrectLights"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
  embedded
>

  <a-assets>
    <video
      id="characterVideo"
      src="./assets/character.mov"
      autoplay
      loop
      muted
      playsinline
      webkit-playsinline
      crossorigin="anonymous"
    ></video>
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity id="target" mindar-image-target="targetIndex: 0">

    <!--
      元コードではここが position="0 0.8 0" rotation="-90 0 0" でした。
      今回は「マーカー面から起き上がって、その場に立つ」形にするため、
      高さをZ方向に出しています。
    -->
    <a-video
      src="#characterVideo"
      width="1"
      height="1.7"
      position="0 0 0.85"
      rotation="90 0 0"
      material="side: double;"
    ></a-video>

  </a-entity>

</a-scene>

<script>
const msg = document.querySelector("#msg");
const target = document.querySelector("#target");

document.body.addEventListener("click", async () => {
  const vid = document.querySelector("#characterVideo");
  try {
    await vid.play();
  } catch(e) {
    console.log(e);
  }
});

document.body.addEventListener("touchstart", async () => {
  const vid = document.querySelector("#characterVideo");
  try {
    await vid.play();
  } catch(e) {
    console.log(e);
  }
});

target.addEventListener("targetFound", () => {
  msg.textContent = "読み込み成功";
});

target.addEventListener("targetLost", () => {
  msg.textContent = "マーカーを映してください";
});
</script>

</body>
</html>
