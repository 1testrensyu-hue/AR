<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>AR Character Test</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <style>
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:transparent;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}
    .mindar-container,.mindar-container video,video[data-camera-video="1"]{position:fixed!important;inset:0!important;width:100vw!important;height:100vh!important;min-width:100vw!important;min-height:100vh!important;max-width:none!important;max-height:none!important;object-fit:cover!important;z-index:0!important;opacity:1!important;display:block!important;background:transparent!important;}
    #characterVideo{display:none!important;width:1px!important;height:1px!important;opacity:0!important;pointer-events:none!important;}
    a-scene,.a-canvas,canvas{position:fixed!important;inset:0!important;width:100vw!important;height:100vh!important;background:transparent!important;}
    a-scene,.a-canvas{z-index:2!important;}
    .mindar-ui-overlay,.mindar-ui-scanning,.mindar-ui-loading,.mindar-ui-compatibility{z-index:20!important;background:transparent!important;}
    #startScreen{position:fixed;inset:0;z-index:9999;display:grid;place-items:center;background:linear-gradient(180deg,rgba(255,255,255,.97),rgba(235,245,255,.97));color:#333;padding:24px;box-sizing:border-box;text-align:center;}
    .panel{width:min(92vw,480px);padding:22px 18px;border-radius:20px;background:rgba(255,255,255,.92);box-shadow:0 12px 35px rgba(0,0,0,.16);}h1{margin:0 0 10px;font-size:22px;}p{margin:8px 0;line-height:1.6;font-size:14px;}.row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:14px;}button{border:0;border-radius:999px;padding:13px 18px;font-size:15px;font-weight:700;background:#ff6fae;color:#fff;box-shadow:0 8px 18px rgba(255,111,174,.35);}button.sub{background:#555;box-shadow:none;}
    #status{position:fixed;left:12px;right:12px;bottom:calc(12px + env(safe-area-inset-bottom));z-index:100;padding:10px 12px;border-radius:14px;background:rgba(255,255,255,.86);color:#222;font-size:13px;text-align:center;pointer-events:none;}
    #debug{position:fixed;left:8px;top:calc(8px + env(safe-area-inset-top));z-index:101;padding:6px 8px;border-radius:8px;background:rgba(0,0,0,.58);color:#fff;font-size:11px;line-height:1.45;pointer-events:none;max-width:92vw;}
    .hidden{display:none!important;}
  </style>
</head>
<body>
  <div id="startScreen"><div class="panel"><h1>ARテスト</h1><p>「ARを開始」を押して、カメラ許可後にマーカーを映してください。</p><p>反応しない場合は「表示テスト」でキャラ素材だけ出るか確認できます。</p><div class="row"><button id="startButton">ARを開始</button><button id="testButton" class="sub">表示テスト</button></div><p id="errorText"></p></div></div>
  <div id="debug">debug</div><div id="status">待機中</div>
  <a-scene id="scene" mindar-image="imageTargetSrc: ./assets/target.mind; autoStart: false; uiScanning: yes; uiLoading: yes; filterMinCF: 0.001; filterBeta: 0.01; warmupTolerance: 5; missTolerance: 10;" color-space="sRGB" renderer="colorManagement: true; alpha: true; antialias: true; precision: mediump;" background="transparent: true" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false" embedded>
    <a-assets timeout="30000"><video id="characterVideo" src="./assets/character.webm" preload="auto" muted loop playsinline webkit-playsinline crossorigin="anonymous"></video></a-assets>
    <a-camera position="0 0 0" look-controls="enabled:false"></a-camera>
    <a-entity id="target" mindar-image-target="targetIndex: 0"><a-video id="characterPlane" src="#characterVideo" position="0 0 0.02" width="1" height="1" material="transparent:true; alphaTest:0.01; side:double; shader:flat; depthTest:false; depthWrite:false"></a-video></a-entity>
    <a-video id="testPlane" src="#characterVideo" position="0 0 -2" width="1.4" height="1.4" visible="false" material="transparent:true; alphaTest:0.01; side:double; shader:flat"></a-video>
  </a-scene>
  <script>
    const $=id=>document.getElementById(id);const scene=$('scene'),target=$('target'),video=$('characterVideo'),status=$('status'),debug=$('debug'),startScreen=$('startScreen'),err=$('errorText'),testPlane=$('testPlane');let started=false,foundCount=0;
    function setStatus(t){status.textContent=t;}
    function transparent(){if(scene.renderer&&window.THREE){scene.renderer.setClearColor(new THREE.Color(0x000000),0);scene.renderer.domElement.style.background='transparent';}}
    function fix(){const vids=[...document.querySelectorAll('video')];const cams=vids.filter(v=>v.id!=='characterVideo');cams.forEach(v=>{v.dataset.cameraVideo='1';v.setAttribute('playsinline','');v.setAttribute('webkit-playsinline','');Object.assign(v.style,{position:'fixed',inset:'0',width:'100vw',height:'100vh',minWidth:'100vw',minHeight:'100vh',maxWidth:'none',maxHeight:'none',objectFit:'cover',zIndex:'0',opacity:'1',display:'block',background:'transparent'});});transparent();debug.innerHTML=`camera:${cams.length} video:${vids.length}<br>found:${foundCount}<br>${navigator.userAgent.slice(0,70)}`;}
    async function playVideo(){video.muted=true;video.loop=true;video.playsInline=true;try{await video.play();}catch(e){console.warn(e);}}
    async function ensureLoaded(){if(!scene.hasLoaded) await new Promise(r=>scene.addEventListener('loaded',r,{once:true}));}
    $('startButton').addEventListener('click',async()=>{err.textContent='';setStatus('カメラ起動中…');try{await playVideo();await ensureLoaded();transparent();await scene.systems['mindar-image-system'].start();started=true;startScreen.classList.add('hidden');setStatus('マーカーを映してください');fix();[200,700,1500,3000].forEach(t=>setTimeout(fix,t));setInterval(fix,2000);}catch(e){console.error(e);err.textContent='起動できませんでした。HTTPSのGitHub Pagesで開いて、カメラ許可を確認してください。';setStatus('起動エラー');}});
    $('testButton').addEventListener('click',async()=>{err.textContent='';try{await playVideo();await ensureLoaded();startScreen.classList.add('hidden');testPlane.setAttribute('visible','true');setStatus('表示テスト中：キャラが出ればWebMはOK');transparent();fix();}catch(e){err.textContent='表示テストも失敗しました';console.error(e);}});
    target.addEventListener('targetFound',async()=>{foundCount++;testPlane.setAttribute('visible','false');setStatus('認識しました：キャラクター表示');try{video.currentTime=0;await video.play();}catch(e){}});
    target.addEventListener('targetLost',()=>setStatus('マーカーを見失いました'));
    scene.addEventListener('renderstart',fix);window.addEventListener('resize',fix);window.addEventListener('orientationchange',()=>setTimeout(fix,300));
  </script>
</body>
</html>
